        <h1>Chequi — Control de Acceso Profesional para Eventos</h1>
        <p>Sistema profesional de control de acceso para eventos corporativos y masivos. Gestiona desde 100 hasta 50,000+ asistentes con tecnología QR en tiempo real.</p>

        <h2>Características principales</h2>
        <ul>
          <li><strong>Tickets QR Personalizados:</strong> Genera códigos QR únicos por asistente con tu logo y colores. Previene fraude y reventa. Exportación masiva en PNG y PDF.</li>
          <li><strong>Escáner Multi-Dispositivo:</strong> Funciona en cualquier smartphone sin instalación. Modo offline con sincronización automática. Múltiples puntos de control simultáneos.</li>
          <li><strong>Dashboard en Tiempo Real:</strong> Métricas de asistencia en vivo. Gráficos de actividad por hora. Tasas de llegada y ocupación.</li>
          <li><strong>Gestión de Asistentes:</strong> Importación masiva desde Excel. Asignación automática de tickets. Categorización por tipo/empresa.</li>
          <li><strong>Control de Seguridad:</strong> Roles diferenciados (Admin/Control/Scanner). Auditoría completa de accesos. Protección de datos con políticas RLS.</li>
          <li><strong>Reportes Empresariales:</strong> Exportación Excel con 5 hojas detalladas. Análisis por categoría de ticket. Actividad por hora con picos.</li>
        </ul>

        <h2>Casos de uso</h2>
        <ul>
          <li>Eventos corporativos y conferencias (50 - 5,000 asistentes)</li>
          <li>Conciertos y festivales (500 - 50,000+ asistentes)</li>
          <li>Eventos académicos y graduaciones (100 - 10,000 asistentes)</li>
          <li>Eventos deportivos (1,000 - 100,000 asistentes)</li>
          <li>Ferias y exposiciones (1,000 - 20,000 asistentes)</li>
        </ul>

        <h2>Tres pasos para tu evento exitoso</h2>
        <ul>
          <li><strong>1. Configura (15 min):</strong> Crea tu evento, define categorías de tickets y sube tu lista de asistentes desde Excel.</li>
          <li><strong>2. Distribuye (Automático):</strong> Genera códigos QR únicos. Exporta en PNG o PDF y envía por correo.</li>
          <li><strong>3. Controla (Durante el evento):</strong> Escanea QR con cualquier smartphone. Dashboard en tiempo real con métricas.</li>
        </ul>

        <h2>Resultados medibles</h2>
        <ul>
          <li>95% reducción de fraude vs métodos tradicionales</li>
          <li>-70% tiempo de registro comparado con papel</li>
          <li>100% visibilidad en tiempo real</li>
          <li>Menos de 2 minutos para configurar cada punto de control</li>
        </ul>

        <p>Para usar Chequi, por favor habilita JavaScript en tu navegador. <a href="https://chequi.online/auth">Iniciar sesión</a></p>
        <p>Hecho en Colombia con ❤️ — Bogotá, Colombia</p>
